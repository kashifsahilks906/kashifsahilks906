name: Generate Streak Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=kashifsahilks906&background=ffffff&border=ffffff&stroke=ffffff&ring=D85A30&fire=D85A30&currStreakNum=D85A30&currStreakLabel=D85A30&sideNums=D85A30&sideLabels=D85A30&dates=24292f&hide_border=true
          path: streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add streak.svg
          git commit -m "Update streak stats" || exit 0
          git push